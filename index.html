<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aire acondicionado 3D</title>
  <style>
    body, html { margin: 0; height: 100%; overflow: hidden; background: #111; color: #fff; font-family: Arial, sans-serif; }
    #canvas-container { width: 100vw; height: 100vh; }
    .info {
      position: absolute;
      left: 16px;
      top: 16px;
      z-index: 1;
      background: rgba(0,0,0,0.5);
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .info h1 { margin: 0 0 8px; font-size: 16px; }
    .info p { margin: 4px 0; font-size: 14px; }
  </style>
</head>
<body>
  <div class="info">
    <h1>Aire acondicionado 3D</h1>
    <p>Usa el ratón para rotar.</p>
    <p>Temperatura: <span id="tempValue">22ºC</span></p>
  </div>
  <div id="canvas-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>
  <script>
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3, 7);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1.2, 0);

    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);
    const directional = new THREE.DirectionalLight(0xffffff, 0.8);
    directional.position.set(5, 10, 7);
    scene.add(directional);

    const wall = new THREE.Mesh(
      new THREE.BoxGeometry(12, 6, 0.2),
      new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 })
    );
    wall.position.set(0, 3, -3);
    scene.add(wall);

    const acGroup = new THREE.Group();
    scene.add(acGroup);

    const bodyMain = new THREE.Mesh(
      new THREE.BoxGeometry(5.2, 1.2, 1.1),
      new THREE.MeshStandardMaterial({ color: 0xf5f5f5, roughness: 0.6, metalness: 0.05 })
    );
    bodyMain.position.set(0, 2.45, 0);
    bodyMain.rotation.x = 0.02;
    acGroup.add(bodyMain);

    const topCurve = new THREE.Mesh(
      new THREE.BoxGeometry(5.2, 0.16, 1.1),
      new THREE.MeshStandardMaterial({ color: 0xf7f7f7, roughness: 0.6, metalness: 0.05 })
    );
    topCurve.position.set(0, 2.9, 0);
    topCurve.rotation.x = 0.02;
    acGroup.add(topCurve);

    const bottomPanel = new THREE.Mesh(
      new THREE.BoxGeometry(5.3, 0.4, 0.55),
      new THREE.MeshStandardMaterial({ color: 0xececec, roughness: 0.65, metalness: 0.05 })
    );
    bottomPanel.position.set(0, 2.15, 0.3);
    bottomPanel.rotation.x = 0.04;
    acGroup.add(bottomPanel);

    const blackStrip = new THREE.Mesh(
      new THREE.BoxGeometry(5.0, 0.08, 0.08),
      new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.25, metalness: 0.2 })
    );
    blackStrip.position.set(0, 2.57, 0.55);
    acGroup.add(blackStrip);

    const ventGroup = new THREE.Group();
    const ventMaterial = new THREE.MeshStandardMaterial({ color: 0x1f2734, roughness: 0.4, metalness: 0.1 });
    for (let i = 0; i < 7; i++) {
      const vent = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.02, 0.72), ventMaterial);
      vent.position.set(-2.1 + i * 0.7, 2.16, 0.02);
      vent.rotation.x = 0.05;
      ventGroup.add(vent);
    }
    acGroup.add(ventGroup);

    const displayBg = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 0.3, 0.08),
      new THREE.MeshStandardMaterial({ color: 0x111822, roughness: 0.4, metalness: 0.2 })
    );
    displayBg.position.set(1.7, 2.7, 0.65);
    acGroup.add(displayBg);

    const displayLight = new THREE.PointLight(0x3dc5ff, 1, 4);
    displayLight.position.set(1.7, 2.7, 0.8);
    acGroup.add(displayLight);

    const iconGeometry = new THREE.SphereGeometry(0.08, 16, 16);
    const iconMaterial = new THREE.MeshStandardMaterial({ color: 0x3dc5ff, emissive: 0x3dc5ff, emissiveIntensity: 0.6 });
    const icon = new THREE.Mesh(iconGeometry, iconMaterial);
    icon.position.set(1.45, 2.7, 0.72);
    acGroup.add(icon);

    const tempTexture = createTemperatureTexture('22°C');
    const displayPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(1.0, 0.22),
      new THREE.MeshBasicMaterial({ map: tempTexture, transparent: true })
    );
    displayPlane.position.set(1.7, 2.7, 0.725);
    acGroup.add(displayPlane);

    function createTemperatureTexture(text) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = 'rgba(0, 0, 0, 0)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#50d7ff';
      ctx.font = 'bold 72px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2 + 6);
      return new THREE.CanvasTexture(canvas);
    }

    window.addEventListener('resize', onWindowResize);
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      acGroup.rotation.y += 0.003;
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
