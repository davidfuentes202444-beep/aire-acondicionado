<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aire acondicionado 3D</title>
  <style>
    body, html { margin: 0; height: 100%; overflow: hidden; background: #111; color: #fff; font-family: Arial, sans-serif; }
    #canvas-container { width: 100vw; height: 100vh; }
    .info {
      position: absolute;
      left: 16px;
      top: 16px;
      z-index: 1;
      background: rgba(0,0,0,0.45);
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .info h1 { margin: 0 0 8px; font-size: 16px; }
    .info p { margin: 4px 0; font-size: 14px; }
  </style>
</head>
<body>
  <div class="info">
    <h1>Aire acondicionado 3D</h1>
    <p>Gira lentamente sobre su propio eje.</p>
    <p>Temperatura: <span id="tempValue">22ºC</span></p>
  </div>
  <div id="canvas-container"></div>
  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/controls/OrbitControls.js';

    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x121217);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2.8, 7);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enablePan = false;
    controls.target.set(0, 2.2, 0);

    const ambient = new THREE.AmbientLight(0xffffff, 0.55);
    scene.add(ambient);

    const directional = new THREE.DirectionalLight(0xffffff, 0.75);
    directional.position.set(6, 8, 7);
    directional.castShadow = true;
    directional.shadow.mapSize.set(1024, 1024);
    scene.add(directional);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(18, 18),
      new THREE.MeshStandardMaterial({ color: 0x12151d, roughness: 0.95 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    scene.add(floor);

    const acGroup = new THREE.Group();
    scene.add(acGroup);

    const mainBody = new THREE.Mesh(
      new THREE.BoxGeometry(5.2, 1.2, 1.05),
      new THREE.MeshStandardMaterial({ color: 0xf5f6f8, roughness: 0.56, metalness: 0.02 })
    );
    mainBody.position.set(0, 2.45, 0);
    acGroup.add(mainBody);

    const frontPanel = new THREE.Mesh(
      new THREE.BoxGeometry(5.24, 0.8, 0.08),
      new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.7, metalness: 0.05 })
    );
    frontPanel.position.set(0, 2.45, 0.56);
    acGroup.add(frontPanel);

    const bottomPanel = new THREE.Mesh(
      new THREE.BoxGeometry(5.2, 0.34, 0.45),
      new THREE.MeshStandardMaterial({ color: 0xe7e9ec, roughness: 0.74 })
    );
    bottomPanel.position.set(0, 2.12, 0.22);
    bottomPanel.rotation.x = 0.03;
    acGroup.add(bottomPanel);

    const blackStrip = new THREE.Mesh(
      new THREE.BoxGeometry(4.98, 0.08, 0.07),
      new THREE.MeshStandardMaterial({ color: 0x111316, roughness: 0.22, metalness: 0.25 })
    );
    blackStrip.position.set(0, 2.55, 0.58);
    acGroup.add(blackStrip);

    const displayLight = new THREE.PointLight(0x3dc5ff, 1.2, 3);
    displayLight.position.set(1.6, 2.7, 0.9);
    acGroup.add(displayLight);

    const icon = new THREE.Mesh(
      new THREE.SphereGeometry(0.07, 16, 16),
      new THREE.MeshStandardMaterial({ color: 0x3dc5ff, emissive: 0x3dc5ff, emissiveIntensity: 0.9 })
    );
    icon.position.set(1.4, 2.7, 0.64);
    acGroup.add(icon);

    const tempTexture = createTemperatureTexture('22°C');
    const displayPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(0.9, 0.18),
      new THREE.MeshBasicMaterial({ map: tempTexture, transparent: true })
    );
    displayPlane.position.set(1.82, 2.7, 0.62);
    acGroup.add(displayPlane);

    const ventMaterial = new THREE.MeshStandardMaterial({ color: 0x1d242f, roughness: 0.38, metalness: 0.08 });
    for (let row = 0; row < 3; row++) {
      for (let i = 0; i < 9; i++) {
        const slat = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.03, 0.08), ventMaterial);
        slat.position.set(-1.8 + i * 0.45, 2.08 + row * 0.07, 0.3);
        slat.rotation.x = -0.06;
        acGroup.add(slat);
      }
    }

    function createTemperatureTexture(text) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#50d7ff';
      ctx.font = 'bold 60px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2 + 6);
      return new THREE.CanvasTexture(canvas);
    }

    window.addEventListener('resize', onWindowResize);
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      acGroup.rotation.y += 0.0025;
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
