<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aire acondicionado 3D</title>
  <style>
    body, html { margin: 0; height: 100%; overflow: hidden; background: #0c0d12; color: #fff; font-family: Arial, sans-serif; }
    #canvas-container { width: 100vw; height: 100vh; display: block; }
    .info {
      position: absolute;
      left: 16px;
      top: 16px;
      z-index: 2;
      background: rgba(0, 0, 0, 0.55);
      padding: 14px 18px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    .info h1 { margin: 0 0 8px; font-size: 18px; }
    .info p { margin: 4px 0; font-size: 14px; }
  </style>
</head>
<body>
  <div class="info">
    <h1>Aire acondicionado 3D</h1>
    <p>Gira lentamente sobre su propio eje.</p>
    <p>Temperatura: <span id="tempValue">22ºC</span></p>
  </div>
  <div id="canvas-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>
  <script>
    const container = document.getElementById('canvas-container');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b0c11);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3.1, 7);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enablePan = false;
    controls.target.set(0, 2.25, 0);

    const hemi = new THREE.HemisphereLight(0x8aa2ff, 0x111111, 0.45);
    scene.add(hemi);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
    dirLight.position.set(6, 8, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.top = 6;
    dirLight.shadow.camera.bottom = -6;
    dirLight.shadow.camera.left = -6;
    dirLight.shadow.camera.right = 6;
    scene.add(dirLight);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(22, 22),
      new THREE.MeshStandardMaterial({ color: 0x11131a, roughness: 0.95 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    const acGroup = new THREE.Group();
    scene.add(acGroup);

    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xf3f4f8, roughness: 0.57, metalness: 0.03 });
    const panelMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.7, metalness: 0.04 });
    const darkMat = new THREE.MeshStandardMaterial({ color: 0x1c2430, roughness: 0.36, metalness: 0.08 });

    const body = new THREE.Mesh(new THREE.BoxGeometry(5.1, 1.18, 1.05), bodyMat);
    body.position.set(0, 2.45, 0);
    body.castShadow = true;
    body.receiveShadow = true;
    acGroup.add(body);

    const face = new THREE.Mesh(new THREE.BoxGeometry(5.08, 0.8, 0.08), panelMat);
    face.position.set(0, 2.45, 0.53);
    face.castShadow = true;
    acGroup.add(face);

    const lowerPanel = new THREE.Mesh(new THREE.BoxGeometry(5.0, 0.34, 0.43), new THREE.MeshStandardMaterial({ color: 0xe9ebeef, roughness: 0.74 }));
    lowerPanel.position.set(0, 2.12, 0.2);
    lowerPanel.rotation.x = 0.03;
    acGroup.add(lowerPanel);

    const blackBand = new THREE.Mesh(new THREE.BoxGeometry(5.0, 0.08, 0.06), darkMat);
    blackBand.position.set(0, 2.55, 0.58);
    acGroup.add(blackBand);

    const display = new THREE.Mesh(new THREE.PlaneGeometry(0.9, 0.18), new THREE.MeshBasicMaterial({ map: createDisplayTexture('22°C'), transparent: true }));
    display.position.set(1.78, 2.7, 0.64);
    acGroup.add(display);

    const displayGlow = new THREE.PointLight(0x3dc5ff, 1.3, 3);
    displayGlow.position.set(1.7, 2.7, 0.85);
    acGroup.add(displayGlow);

    const status = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), new THREE.MeshStandardMaterial({ color: 0x3dc5ff, emissive: 0x3dc5ff, emissiveIntensity: 0.9 }));
    status.position.set(1.35, 2.7, 0.65);
    acGroup.add(status);

    for (let row = 0; row < 3; row++) {
      for (let i = 0; i < 9; i++) {
        const vent = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.03, 0.08), darkMat);
        vent.position.set(-1.8 + i * 0.45, 2.08 + row * 0.07, 0.26);
        vent.rotation.x = -0.06;
        acGroup.add(vent);
      }
    }

    const side1 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.18, 1.05), bodyMat);
    side1.position.set(2.55, 2.45, 0);
    acGroup.add(side1);

    const side2 = side1.clone();
    side2.position.set(-2.55, 2.45, 0);
    acGroup.add(side2);

    function createDisplayTexture(text) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(0,0,0,0)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#50d7ff';
      ctx.font = 'bold 62px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2 + 4);
      return new THREE.CanvasTexture(canvas);
    }

    window.addEventListener('resize', onWindowResize);
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      acGroup.rotation.y += 0.0028;
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
