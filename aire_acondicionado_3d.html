<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aire acondicionado 3D</title>
  <style>
    body, html { margin: 0; height: 100%; overflow: hidden; background: #07080c; color: #fff; font-family: Arial, sans-serif; }
    #canvas-container { width: 100vw; height: 100vh; display: block; }
    .info {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 2;
      background: rgba(0, 0, 0, 0.55);
      color: #e6eefb;
      padding: 14px 18px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 12px 34px rgba(0,0,0,0.35);
    }
    .info h1 { margin: 0 0 8px; font-size: 18px; }
    .info p { margin: 4px 0; font-size: 14px; }
    a { color: #7cc5ff; }
  </style>
</head>
<body>
  <div class="info">
    <h1>Aire acondicionado 3D</h1>
    <p>Gira lentamente sobre su eje vertical.</p>
    <p>Temperatura fija: <strong>22ºC</strong></p>
    <p>Archivo: <code>aire_acondicionado_3d.html</code></p>
  </div>
  <div id="canvas-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>
  <script>
    const container = document.getElementById('canvas-container');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x090b10);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2.8, 7);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enablePan = false;
    controls.target.set(0, 2.2, 0);

    const hemiLight = new THREE.HemisphereLight(0x888cff, 0x111111, 0.45);
    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.98);
    dirLight.position.set(6, 8, 6);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.top = 6;
    dirLight.shadow.camera.bottom = -6;
    dirLight.shadow.camera.left = -6;
    dirLight.shadow.camera.right = 6;
    scene.add(dirLight);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: 0x0f131d, roughness: 0.96 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    const acGroup = new THREE.Group();
    scene.add(acGroup);

    const bodyMaterial = new THREE.MeshStandardMaterial({ color: 0xf4f5f8, roughness: 0.56, metalness: 0.03 });
    const panelMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.68, metalness: 0.02 });
    const blackMaterial = new THREE.MeshStandardMaterial({ color: 0x11171f, roughness: 0.22, metalness: 0.15 });
    const ventMaterial = new THREE.MeshStandardMaterial({ color: 0x1e2937, roughness: 0.38, metalness: 0.08 });

    const body = new THREE.Mesh(new THREE.BoxGeometry(5.1, 1.18, 1.08), bodyMaterial);
    body.position.set(0, 2.45, 0);
    body.castShadow = true;
    body.receiveShadow = true;
    acGroup.add(body);

    const frontPanel = new THREE.Mesh(new THREE.BoxGeometry(5.08, 0.78, 0.08), panelMaterial);
    frontPanel.position.set(0, 2.45, 0.56);
    frontPanel.castShadow = true;
    acGroup.add(frontPanel);

    const bottomPanel = new THREE.Mesh(new THREE.BoxGeometry(5.04, 0.36, 0.44), new THREE.MeshStandardMaterial({ color: 0xe5e8ec, roughness: 0.74 }));
    bottomPanel.position.set(0, 2.12, 0.2);
    bottomPanel.rotation.x = 0.03;
    acGroup.add(bottomPanel);

    const blackStrip = new THREE.Mesh(new THREE.BoxGeometry(5.0, 0.075, 0.06), blackMaterial);
    blackStrip.position.set(0, 2.55, 0.58);
    acGroup.add(blackStrip);

    const displayTexture = createTextTexture('22°C');
    const display = new THREE.Mesh(
      new THREE.PlaneGeometry(0.9, 0.18),
      new THREE.MeshBasicMaterial({ map: displayTexture, transparent: true })
    );
    display.position.set(1.75, 2.7, 0.64);
    acGroup.add(display);

    const displayLight = new THREE.PointLight(0x3dc5ff, 1.2, 3);
    displayLight.position.set(1.7, 2.7, 0.85);
    acGroup.add(displayLight);

    const statusDot = new THREE.Mesh(
      new THREE.SphereGeometry(0.068, 16, 16),
      new THREE.MeshStandardMaterial({ color: 0x3dc5ff, emissive: 0x3dc5ff, emissiveIntensity: 0.9 })
    );
    statusDot.position.set(1.35, 2.7, 0.65);
    acGroup.add(statusDot);

    for (let row = 0; row < 3; row++) {
      for (let i = 0; i < 9; i++) {
        const slat = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.03, 0.08), ventMaterial);
        slat.position.set(-1.8 + i * 0.45, 2.08 + row * 0.07, 0.28);
        slat.rotation.x = -0.06;
        acGroup.add(slat);
      }
    }

    const sideLeft = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.18, 1.08), bodyMaterial);
    sideLeft.position.set(2.55, 2.45, 0);
    acGroup.add(sideLeft);
    const sideRight = sideLeft.clone();
    sideRight.position.set(-2.55, 2.45, 0);
    acGroup.add(sideRight);

    function createTextTexture(text) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(0, 0, 0, 0)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#50d7ff';
      ctx.font = 'bold 62px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2 + 4);
      return new THREE.CanvasTexture(canvas);
    }

    window.addEventListener('resize', onWindowResize);
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      acGroup.rotation.y += 0.0028;
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
